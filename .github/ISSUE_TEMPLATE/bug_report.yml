name: Bug report
description: Report reproducible formula recognition, clipboard, Word, or UI behavior.
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: checkboxes
    attributes:
      label: Privacy check
      options:
        - label: I removed private chats, account data, document content, and credentials.
          required: true
  - type: input
    attributes:
      label: ChatGPT_Latex version
      placeholder: v1.0.0
    validations:
      required: true
  - type: input
    attributes:
      label: Browser and version
      placeholder: Chrome 000 on Windows 11
    validations:
      required: true
  - type: input
    attributes:
      label: Site and Word version
      placeholder: chatgpt.com; Microsoft 365 Word version 0000
  - type: textarea
    attributes:
      label: Minimal formula and steps
      description: Use a synthetic formula, not private conversation content.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
