name: Feature request
description: Suggest a focused compatibility, workflow, or performance improvement.
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    attributes:
      label: Problem
      description: Describe the workflow problem without private chat or document content.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    attributes:
      label: Compatibility and performance impact
      description: Note affected sites, browsers, Word versions, permissions, or page overhead.
